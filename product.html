<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Page</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}

.wrapper{
  max-width:1300px;
  margin:auto;
  padding:30px;
}

/* PRODUCT LAYOUT */

.product-layout{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:40px;
}

/* LEFT SIDE */

.gallery-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.gallery-grid img{
  width:100%;
  border-radius:14px;
  object-fit:cover;
  cursor:pointer;
}

/* RIGHT SIDE */

.product-info h1{
  font-size:58px;
  margin:0 0 20px;
  font-weight:500;
}

.price-row{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:30px;
}

.new-price{
  color:#c21807;
  font-size:42px;
  font-weight:bold;
}

.old-price{
  color:#777;
  text-decoration:line-through;
  font-size:28px;
}

.sale-badge{
  background:#3559e0;
  color:white;
  padding:8px 14px;
  border-radius:5px;
  font-size:18px;
}

/* OFFER BOX */

.offer-container{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.offer-box{
  border:2px solid #ddd;
  border-radius:10px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
  background:white;
}

.offer-box.active{
  border:3px solid #d61f3d;
  background:#ffe7ec;
}

.offer-left{
  display:flex;
  gap:15px;
  align-items:center;
}

.offer-left img{
  width:60px;
  border-radius:6px;
}

.offer-title{
  font-size:18px;
  font-weight:bold;
}

.save-badge{
  background:black;
  color:white;
  padding:4px 10px;
  border-radius:5px;
  font-size:13px;
  display:inline-block;
  margin-top:5px;
}

.offer-price{
  text-align:right;
}

.offer-price del{
  color:#777;
}

.offer-price strong{
  display:block;
  font-size:20px;
  margin-top:5px;
}

/* SHIPPING */

.shipping-box{
  margin-top:18px;
  border:2px solid #ddd;
  border-radius:10px;
  padding:18px;
  background:white;
  display:flex;
  justify-content:space-between;
  font-size:22px;
}

/* BUTTONS */

.button-group{
  display:flex;
  gap:15px;
  margin-top:30px;
}

.btn{
  padding:16px 28px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:17px;
  font-weight:bold;
  text-decoration:none;
}

.order-btn{
  background:#27ae60;
  color:white;
}

.whatsapp-btn{
  background:#1e3d59;
  color:white;
}

/* ABOUT */

.about-product{
  margin-top:40px;
  background:white;
  padding:25px;
  border-radius:14px;
}

.about-product h2{
  margin-top:0;
}

/* MOBILE */

@media(max-width:900px){

  .product-layout{
    grid-template-columns:1fr;
  }

  .product-info h1{
    font-size:38px;
  }

}

</style>
</head>

<body>
